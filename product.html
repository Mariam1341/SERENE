<!DOCTYPE html>
<html lang="en">

  <meta charset="UTF-8" /> <title>Serene.com</title>

  />


  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
  />

<body>
  <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom sticky-top py-3">

      <div class="d-flex align-items-center order-1">

          aria-controls="sereneMenu"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="sereneMenu">
          <ul class="navbar-nav nav-underline fw-bold">
            <li class="nav-item">
              <a class="nav-link text-dark px-2" href="home.html">HOME</a>
            </li>
            <li class="nav-item">
              <a class="nav-link text-dark px-2" href="shop.html">SHOP ALL</a>
            </li>
            <li class="nav-item">
              <a class="nav-link text-dark px-2" href="About us.html">ABOUT US</a>
            </li>
          </ul>
        </div>
      </div>

      <div class="position-absolute start-50 translate-middle-x">
        <a
          class="navbar-brand m-0 p-0 fw-bold"

          style="letter-spacing: 5px; color: #ec238b; font-size: 2rem"

          SERENE

      </div>

      <div class="navbar-icons d-flex align-items-center order-3 ms-auto">
        <a href="#" class="text-dark mx-2"><i class="bi bi-search"></i></a>
        <a href="login.html" class="text-dark d-none d-md-inline mx-2"><i class="bi bi-person"></i></a>
        <a href="#" class="text-dark d-none d-md-inline mx-2"><i class="bi bi-heart"></i></a>

        
        <button
          type="button"
          class="btn p-0 text-dark mx-2 position-relative"
          data-bs-toggle="offcanvas"
          data-bs-target="#cartSidebar"
          aria-controls="cartSidebar"

          <i class="bi bi-bag" style="font-size: 1.2rem;"></i>

        
          <span

            0

    </div>

  <main>
    <section>
      <div class="container py-4" id="single-product"></div>
    </section>
  </main>


<!-- Cart Sidebar -->

 <div class="offcanvas offcanvas-end" tabindex="-1" id="cartSidebar" aria-labelledby="offcanvasLabel">
  <div class="offcanvas-header">
    <h5 class="offcanvas-title" id="offcanvasLabel">shopping Cart </h5>
    <button type="button" class="btn-close text-reset" data-bs-dismiss="offcanvas" aria-label="Close"></button>
  </div>
  <div class="offcanvas-body d-flex flex-column p-3">
    <ul id="cartList" class="list-unstyled mb-0 flex-grow-1"></ul>
    <div id="emptyCart" class="text-center py-5 flex-grow-1 d-none d-flex flex-column justify-content-center align-items-center">
      <div class="mb-3" style="font-size:60px;opacity: .45;" >🛒</div>
        <h6 class="fw-bold">YOUR CART IS CURRENTLY EMPTY!.</h6>
        <p class="text-muted small mb-4">
          Continue shopping
        </p>
        <a href="home.html" class="btn btn-lg fw-bold text-white px-5"
        style="background: #ec238b; border-radius: 0;">Continue </a>
    </div>
  <footer class="pt-3 border-top">
    <div class="d-flex justify-content-between">
      <span>Subtotal</span>
      <strong id="sidebarSubtotal">0 LE</strong>
    </div>
    <a href="checkout.html" class="btn btn-dark w-100 mt-3"style="background: #ec238b">Check Out</a>

</footer>
</div>
</div>
<template id="cartItemlist">
  <li class="cart-item">
    <img class="cart-item-image" />

    <div class="cart-item-content">
      <div class="cart-item-header">
        <div class="cart-item-info">
          <div class="cart-item-name"></div>
          <div class="cart-item-price"></div>
        </div>
        <button class="cart-item-remove">Remove</button>
      </div>

      <div class="cart-item-footer">
        <div class="cart-item-controls">
          <button class="cart-item-btn cart-item-dec">-</button>
          <span class="cart-item-qty"></span>
          <button class="cart-item-btn cart-item-inc">+</button>
        </div>
        <div class="cart-item-total"></div>
      </div>
    </div>
  </li>
</template>

  
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"
  ></script>

  
  <script src="js/products.js"></script>
  <script src="js/cart.js"></script>

  <script>

  document.addEventListener("DOMContentLoaded", async function(){
    await getAllProducts();
    initProductPage();
    if(typeof showCart === "function") showCart();
  });

    function changeQty(amount) {
      const qtySpan = document.getElementById("product-qty");
      if (!qtySpan) return;

      let currentQty = parseInt(qtySpan.innerText);
      if (isNaN(currentQty)) currentQty = 1;

      if (currentQty + amount >= 1) {
        qtySpan.innerText = currentQty + amount;
      }
    }
  </script>
</body>
</html>
