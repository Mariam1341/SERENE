<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css\style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"rel="stylesheet"/>
  </head>

  <body class="m-0 d-flex flex-column min-vh-100" style="background-color: #cff5ff;">
    <main class="container flex-grow-1 d-flex align-items-center">
      <div class="row justify-content-center w-100 g-0">
        <div class="col-12 col-md-7 col-lg-6 col-xl-5">
          <div class="card border-0 shadow-sm" style="border-radius: 26px">
            <div class="card-body p-2 p-md-4">
              <img
                src="pics/cream.png"
                class="mx-auto d-block mb-3"
                width="70"
              />

              <h3 class="text-center mb-3">Register</h3>

              <form id="registerForm">
                <div class="mb-2">
                  <label class="form-label small">Username</label>
                  <input type="text" class="form-control py-1" id="username" />
                  <span id="username_error" class="text-danger small"></span>
                </div>

                <div class="mb-2">
                  <label class="form-label small">Email</label>
                  <input type="email" class="form-control py-1" id="email" />
                  <span id="email_error" class="text-danger small"></span>
                </div>

                <div class="mb-2">
                  <label class="form-label small">Password</label>
                  <input type="password" class="form-control py-1"  id="password" />
                  <span id="password_error" class="text-danger small"></span>
                </div>
                <div class="mb-2">
                  <label class="form-label small">Confirm password</label>
                  <input type="password" class="form-control py-1" id="confirmpassword"/>
                  <span id="confirm_password_error" class="text-danger small"></span>
                </div>

                <button type="submit" class="btn w-100 rounded-pill py-2 mt-2" style="background:#ec238b; color:#fff;">Register</button>

              </form>
                  <p class="text-center mt-3 small mb-0">
                    Already have an account?
                    <a href="Login.html" class="text-decoration-none" style="color:#ec238b">Login</a>
                  </p>
            </div>
          </div>
        </div>
      </div>
    </main>

    <footer class="text-center small py-2">
      <a href="#" class="text-decoration-none" style="color: #ec238b"
        >Privacy policy</a >
     
      <span class="mx-2">|</span>
      <a href="#" class="text-decoration-none" style="color: #ec238b"
        >Terms of service</a >
     
    </footer>


     <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
     <script src="js/register.js"></script>
  </body>
</html>
