<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SERENE</title>

  <link rel="stylesheet" href="css/style.css" />

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
</head>

<body>


  <main class="py-5" style="background:#f8f9fa;">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6 col-xl-5">

          <div class="bg-white shadow-sm p-4 p-md-5 rounded-4">
            <h2 class="text-center fw-bold mb-4" style="color:#ec238b">Get in touch</h2>

            <form id="contactForm" class="d-grid gap-3">

              <div>
                <label for="name" class="form-label">Full Name</label>
                <input type="text" id="name" class="form-control" placeholder="Enter your name" required />
              </div>

              <div>
                <label for="email" class="form-label">Email</label>
                <input type="email" id="email" class="form-control" placeholder="Enter your email" required />
                <span id="emailError" class="text-danger small"></span>
              </div>

              <div>
                <label for="message" class="form-label">Message</label>
                <textarea id="message" class="form-control" rows="5" placeholder="Write your message" required></textarea>
              </div>

              <button type="submit" class="btn text-white py-2" style="background:#ec238b">
                Send message
              </button>

            </form>
          </div>

        </div>
      </div>
    </div>
  </main>

  <footer class="footer py-5">
  <div class="container">
    <div class="row gy-4 align-items-start">

    
      <div class="col-12 col-lg-5">
        <div class="d-flex align-items-center gap-2 mb-2">
          <img src="pics/cream.png" class="brand-icon" alt="SERENE icon">
          <h2 class="brand-name m-0">SERENE</h2>
        </div>

        <p class="footer-text mb-0">
         Authentic products, smooth shopping, fast delivery.
        </p>
      </div>


      <div class="col-12 col-md-6 col-lg-3">
        <h6 class="footer-title mb-3">We Are Social</h6>
        <div class="social d-flex gap-2">
          <span class="social-icon" aria-label="Instagram">
            <i class="bi bi-instagram"></i>
          </span>
                    <span class="social-icon" aria-label="TikTok">
            <i class="bi bi-tiktok"></i>
          </span>

          <span class="social-icon" aria-label="Facebook">
            <i class="bi bi-facebook"></i>
          </span>
        </div>
      </div>


      <div class="col-12 col-md-6 col-lg-4">
        <h6 class="footer-title mb-3">Need Help?</h6>

        <p class="footer-text mb-2">Sat–Thu, 9:00am – 7:00pm</p>
        <a class="footer-link d-inline-block mb-2" href="serene@Outlook.com">serene@Outlook.com</a>
        <p class="footer-text mb-3">Cairo, Egypt</p>

        <a class="contact-link" href="#">Contact Us</a>
      </div>

    </div>

    <hr class="footer-line my-4">

    <div class="d-flex flex-column flex-md-row justify-content-between gap-2">
      <small class="footer-text">© 2026 SERENE. All rights reserved.</small>
      <small class="footer-text"><a class="footer-link" href="#">Privacy</a> · <a class="footer-link" href="#">Terms</a></small>
    </div>
  </div>
</footer>


  

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    const form = document.getElementById("contactForm");

    form.addEventListener("submit", function (event) {
      event.preventDefault();

      const fullname = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();
      const message = document.getElementById("message").value.trim();

      const emailError = document.getElementById("emailError");
      emailError.textContent = "";

      if (!email.includes("@") || !email.includes(".")) {
        emailError.textContent = "Please enter a valid email format.";
        return;
      }

      console.log({ Name: fullname, Email: email, Message: message });

      alert("Your message has been received successfully. We'll reply within 24 hours.");
      form.reset();
    });
  </script>

</body>
</html>
